<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ‚îÄ‚îÄ HEADER ‚îÄ‚îÄ */
.header{background:linear-gradient(135deg,#0d2137,var(--primary));color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-left h1{font-size:16px;font-weight:800;letter-spacing:.5px}

.tabs{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:8px;padding:3px}
.tab{background:transparent;border:none;color:rgba(255,255,255,.6);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.tab.active{background:#fff;color:var(--primary)}
.tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.12)}
.tab .tab-badge{background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px}

/* ‚îÄ‚îÄ LAYOUT ‚îÄ‚îÄ */
.page{max-width:1200px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border)}
.card-hdr{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-hdr .icon{font-size:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ‚îÄ‚îÄ KPI STRIP ‚îÄ‚îÄ */

.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.green::before{background:var(--success)}.kpi.amber::before{background:var(--warn)}.kpi.red::before{background:var(--danger)}.kpi.blue::before{background:var(--primary-light)}
.kpi-val{font-size:28px;font-weight:800;line-height:1}
.kpi.green .kpi-val{color:var(--success)}.kpi.amber .kpi-val{color:var(--warn)}.kpi.red .kpi-val{color:var(--danger)}.kpi.blue .kpi-val{color:var(--primary-light)}
.kpi-label{font-size:10px;color:var(--text-light);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.kpi-sub{font-size:11px;color:var(--text-light);margin-top:2px}

/* ‚îÄ‚îÄ ALERTS ‚îÄ‚îÄ */

.alert-red{background:#fdedec;color:var(--danger);border-left:4px solid var(--danger)}
.alert-amber{background:#fef9e7;color:#856404;border-left:4px solid var(--warn)}
.alert-green{background:#eafaf1;color:var(--success);border-left:4px solid var(--success)}

/* ‚îÄ‚îÄ TABLES ‚îÄ‚îÄ */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{font-weight:700;color:var(--text-light);text-transform:uppercase;font-size:10px;letter-spacing:.5px;background:#fafbfc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.b-green{background:#eafaf1;color:var(--success)}.b-red{background:#fdedec;color:var(--danger)}.b-amber{background:#fef9e7;color:var(--warn)}.b-gray{background:#f0f0f0;color:var(--text-light)}.b-blue{background:#eaf2f8;color:var(--primary-light)}

/* Chart container */

@media(max-width:768px){

  .tabs{justify-content:center;flex-wrap:wrap}
  .tab{padding:6px 10px;font-size:11px}

// ‚îÄ‚îÄ ROSTER ‚îÄ‚îÄ
const ROSTER=[
{name:"Regine Davenport",dept:"Admissions",rooms:["1","2","3","4"],assigned:true},
{name:"Valerie Estrada",dept:"Activities",rooms:["5"],assigned:true},

const SUPABASE_URL='https://pmnudshutxwidxdtouqj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtbnVkc2h1dHh3aWR4ZHRvdXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjQwMjEsImV4cCI6MjA5MDA0MDAyMX0.NGy8o0y5CKh_QGGLeGs34cIWbbpHZ59mTgCk2kVeikw';

// ‚îÄ‚îÄ DATA STORE ‚îÄ‚îÄ
let store={rounds:[]};
let supabaseLoaded=false;
function exportJSON(){const b=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rounds-'+today()+'.json';a.click()}
function importJSON(file,cb){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.rounds){store=d;cb(d.rounds.length)}else cb(-1)}catch(x){cb(-1)}};r.readAsText(file)}

// ‚îÄ‚îÄ LOAD ROUNDS FROM SUPABASE ‚îÄ‚îÄ
async function loadRounds(){
  if(!sb)return;
  try{
    // Get Monday of current week
    const wd=getWeekDates();
    const weekStart=wd[0]+'T00:00:00';
    const weekEnd=wd[4]+'T23:59:59';

    const{data,error}=await sb.from('rounding_observations')
      .select('id,timestamp,observer_name,observer_role,location,category,observation,severity,action_needed,action_description,source')
      .gte('timestamp',weekStart)
      .lte('timestamp',weekEnd)
      .order('timestamp',{ascending:true});

    if(error){console.error('Supabase load error:',error);return}
    if(!data||!data.length)return;

    // Group by observer+date+room to reconstruct round entries
    const roundMap={};
    data.forEach(obs=>{
      const date=obs.timestamp.split('T')[0];
      const room=(obs.location||'').replace('Room ','');
      const key=obs.observer_name+'|'+date+'|'+room;
      if(!roundMap[key]){
        roundMap[key]={
          id:'sb-'+obs.id,
          timestamp:obs.timestamp,
          rounderName:obs.observer_name,
          roomNumber:room,
          roundDate:date,
          environment:{},
          beds:[],
          resident:{},
          staff:{},
          actions:[],
          _observations:[obs]
        };
      }else{
        roundMap[key]._observations.push(obs);
      }
      // If observation has action items, add them
      if(obs.action_needed&&obs.action_description){
        roundMap[key].actions.push({description:obs.action_description,priority:obs.severity==='urgent'?'high':'medium',department:obs.observer_role||''});
      }
    });

    // Merge Supabase rounds into store without duplicating
    const existingKeys=new Set(store.rounds.map(r=>r.rounderName+'|'+r.roundDate+'|'+r.roomNumber));
    Object.values(roundMap).forEach(r=>{
      const key=r.rounderName+'|'+r.roundDate+'|'+r.roomNumber;
      if(!existingKeys.has(key)){
        store.rounds.push(r);
        existingKeys.add(key);
      }
    });

    supabaseLoaded=true;
    render();
  }catch(e){console.error('loadRounds error:',e)}
}

// ‚îÄ‚îÄ APP STATE ‚îÄ‚îÄ

// ‚îÄ‚îÄ DOM HELPER ‚îÄ‚îÄ
function h(tag,a,...ch){
  const el=document.createElement(tag);
  let deferValue;
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='className')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k==='value'){deferValue=v}
    else if(k==='checked'){el.checked=v}
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c!=null&&c!==false)el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});
  if(deferValue!==undefined)el.value=deferValue;
  return el;
}

// ‚îÄ‚îÄ ROUNDING ANALYTICS (computed from store) ‚îÄ‚îÄ
function getRoundingStats(date){
  const dr=store.rounds.filter(r=>r.roundDate===date);
  const names=new Set(dr.map(r=>r.rounderName));
  const assigned=ROSTER.filter(r=>r.assigned);
  const missing=assigned.filter(r=>!names.has(r.name));
  const comp=assigned.length?Math.round(((assigned.length-missing.length)/assigned.length)*100):0;
  let envIssues=[],resConcerns=[],staffConcerns=[],actions=[];
  dr.forEach(r=>{
    const e=r.environment||{};
    const lbls={roomClean:'Not clean',odorFree:'Odor present',bathroomStocked:'Bathroom not stocked',tempOk:'Temp issue',nameOnDoorCorrect:'Name on door incorrect'};
    Object.keys(lbls).forEach(f=>{if(e[f]==='no')envIssues.push({room:r.roomNumber,issue:lbls[f],notes:e.notes})});
    (r.beds||[]).forEach((b,i)=>{
      const bl={callLight:'Call light',personalItems:'Personal items',nameOnDoor:'Name on door',o2Tubing:'O2 tubing'};
      Object.keys(bl).forEach(f=>{if(b[f]==='no')envIssues.push({room:r.roomNumber,issue:'Bed '+(i?'B':'A')+': '+bl[f]})});
    });
    if(r.resident?.concerns==='yes')resConcerns.push({room:r.roomNumber,detail:r.resident.concernDetails});
    if(r.resident?.discomfort==='yes')resConcerns.push({room:r.roomNumber,detail:'Discomfort: '+(r.resident.discomfortDetails||'observed')});
    if(r.staff?.concerns==='yes')staffConcerns.push({room:r.roomNumber,detail:r.staff.concernDetails});
    if(r.staff?.engaged==='no')staffConcerns.push({room:r.roomNumber,detail:'Staff not engaged'});
    (r.actions||[]).forEach(a=>{if(a.description)actions.push({room:r.roomNumber,...a})});
  });
  return{dr,names,assigned,missing,comp,envIssues,resConcerns,staffConcerns,actions,rounded:assigned.length-missing.length};
}

// Week dates helper
function getWeekDates(refDate){
  const d=new Date((refDate||today())+'T12:00:00');const day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  const dates=[];for(let i=0;i<5;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);dates.push(dd.toISOString().split('T')[0])}
  return dates;
}

  // S3: Resident
  steps.push(()=>{
    const els=[h('div',{className:'section-header'},'Resident Check-In'),h('div',{className:'section-desc'},'Room '+f.room+': How are the residents?'),
      h('div',{className:'field'},h('label',null,'Able to check in with resident?'),bt(f.res.able,v=>{f.res.able=v},[{l:'Yes',v:'yes',c:'by'},{l:'No (sleeping/away)',v:'no',c:'bn'}]))];
    if(f.res.able==='yes'){
      els.push(h('div',{className:'field'},h('label',null,'Any concerns or complaints?'),bt(f.res.concerns,v=>{f.res.concerns=v})));
      if(f.res.concerns==='yes')els.push(h('div',{className:'field'},h('label',null,'Details'),h('textarea',{placeholder:'Describe...',value:f.res.concernDetails,onInput:e=>{f.res.concernDetails=e.target.value}})));
      els.push(h('div',{className:'field'},h('label',null,'Signs of discomfort or pain?'),bt(f.res.discomfort,v=>{f.res.discomfort=v})));
      if(f.res.discomfort==='yes')els.push(h('div',{className:'field'},h('label',null,'Details'),h('textarea',{placeholder:'Describe...',value:f.res.discomfortDetails,onInput:e=>{f.res.discomfortDetails=e.target.value}})));
      els.push(h('div',{className:'field'},h('label',null,'Overall satisfaction'),h('div',{className:'sat-grid'},...['Satisfied','Mostly Satisfied','Dissatisfied','Could Not Assess'].map(s=>h('button',{className:'sat-btn'+(f.res.satisfaction===s?' sel':''),onClick:()=>{f.res.satisfaction=s;render()}},s)))));
    }
    return h('div',{className:'card'},...els);
  });
  // S4: Staff
  steps.push(()=>{
    const els=[h('div',{className:'section-header'},'Staff Check-In'),h('div',{className:'section-desc'},'Room '+f.room+': Staff observations.'),
      h('div',{className:'field'},h('label',null,'Able to check in with staff?'),bt(f.staff.checkIn,v=>{f.staff.checkIn=v}))];
    if(f.staff.checkIn==='yes'){
      els.push(h('div',{className:'field'},h('label',null,'Concerns, supply needs, or equipment issues?'),bt(f.staff.concerns,v=>{f.staff.concerns=v})));
      if(f.staff.concerns==='yes')els.push(h('div',{className:'field'},h('label',null,'Details'),h('textarea',{placeholder:'Describe...',value:f.staff.details,onInput:e=>{f.staff.details=e.target.value}})));
      els.push(h('div',{className:'field'},h('label',null,'Staff appeared engaged?'),bt(f.staff.engaged,v=>{f.staff.engaged=v})));
    }
    return h('div',{className:'card'},...els);
  });
  // S5: Actions
  steps.push(()=>{
    const els=[h('div',{className:'section-header'},'Follow-Up Actions'),h('div',{className:'section-desc'},'Room '+f.room+': Any action items?'),
      h('div',{className:'field'},h('label',null,'Action items needed?'),bt(f.needsAction,v=>{f.needsAction=v}))];
    if(f.needsAction==='yes'){
      f.actions.forEach((a,i)=>{
        els.push(h('div',{className:'action-card'},h('div',{className:'bed-label'},'Action Item #'+(i+1)),
          h('div',{className:'field'},h('label',null,'Description'),h('textarea',{placeholder:'What needs to be done...',value:a.description,rows:'2',onInput:e=>{a.description=e.target.value}})),
          h('div',{className:'field'},h('label',null,'Priority'),h('div',{className:'pri-row'},...[['Low','low','pl'],['Medium','medium','pm'],['High','high','ph']].map(([l,v,c])=>h('button',{className:'pri-btn'+(a.priority===v?' '+c:''),onClick:()=>{a.priority=v;render()}},l)))),
          h('div',{className:'field'},h('label',null,'Assign to Department'),h('select',{value:a.department,onChange:e=>{a.department=e.target.value;render()}},h('option',{value:''},'Select...'),...DEPTS.map(d=>h('option',{value:d},d))))
        ));
      });
      if(f.actions.length<3)els.push(h('button',{className:'btn btn-o',style:{marginBottom:'12px',fontSize:'14px'},onClick:()=>{f.actions.push({description:'',priority:'',department:''});render()}},'+ Add Action Item'));
    }
    els.push(h('div',{className:'field'},h('label',null,'Additional Notes'),h('textarea',{placeholder:'Anything else...',value:f.notes,rows:'2',onInput:e=>{f.notes=e.target.value}})));
    return h('div',{className:'card'},...els);
  });

  const canNext=f.step===0?(f.name&&f.room&&f.date):true;
  return h('div',{className:'page'},h('div',{className:'form-wrap'},
    h('div',{className:'step-dots'},...steps.map((_,i)=>h('div',{className:'dot'+(i===f.step?' active':i<f.step?' done':'')}))),
    typeof steps[f.step]==='function'?steps[f.step]():steps[f.step],
    h('div',{className:'btn-row'},
      f.step>0?h('button',{className:'btn btn-o',onClick:()=>{f.step--;render()}},'Back'):null,
      f.step<steps.length-1
        ?h('button',{className:'btn btn-p',style:{opacity:canNext?1:.5},onClick:()=>{if(canNext){f.step++;render()}}},'Next')
        :h('button',{className:'btn btn-s',onClick:submitRound},'Submit Round')
    )
  ));
}

async function submitRound(){
  const f=formState;
  const entry={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),timestamp:new Date().toISOString(),
    rounderName:f.name,roomNumber:f.room,roundDate:f.date,
    environment:{...f.env},beds:f.beds.filter(b=>Object.values(b).some(v=>v)),
    resident:{ableToCheckIn:f.res.able,concerns:f.res.concerns,concernDetails:f.res.concernDetails,discomfort:f.res.discomfort,discomfortDetails:f.res.discomfortDetails,satisfaction:f.res.satisfaction},
    staff:{checkIn:f.staff.checkIn,concerns:f.staff.concerns,concernDetails:f.staff.details,engaged:f.staff.engaged},
    actions:f.needsAction==='yes'?f.actions.filter(a=>a.description):[],additionalNotes:f.notes};
  store.rounds.push(entry);f.submitted=true;
  showToast('Room '+f.room+' logged!');
  render();

  // ‚îÄ‚îÄ Write to Supabase ‚îÄ‚îÄ
  if(sb){
    try{
      // Derive observer role from roster
      const rosterEntry=ROSTER.find(r=>r.name===entry.rounderName);
      const role=rosterEntry?rosterEntry.dept:'';

      // Build observation summaries from the round data
      const observations=[];
      const env=entry.environment||{};
      const envIssues=[];
      if(env.roomClean==='no')envIssues.push('Room not clean');
      if(env.odorFree==='no')envIssues.push('Odor present');
      if(env.bathroomStocked==='no')envIssues.push('Bathroom not stocked');
      if(env.tempOk==='no')envIssues.push('Temperature issue');
      if(env.nameOnDoorCorrect==='no')envIssues.push('Name on door incorrect');
      (entry.beds||[]).forEach((b,i)=>{
        const lbl='Bed '+(i===0?'A':'B')+': ';
        if(b.callLight==='no')envIssues.push(lbl+'call light not in reach');
        if(b.personalItems==='no')envIssues.push(lbl+'personal items not accessible');
        if(b.nameOnDoor==='no')envIssues.push(lbl+'name on door issue');
        if(b.o2Tubing==='no')envIssues.push(lbl+'O2 tubing issue');
      });

      // Environment observation (always log one per round)
      const envNotes=[...envIssues];
      if(env.notes)envNotes.push(env.notes);
      (entry.beds||[]).forEach((b,i)=>{if(b.notes)envNotes.push('Bed '+(i===0?'A':'B')+': '+b.notes)});

      observations.push({
        timestamp:entry.timestamp,
        observer_name:entry.rounderName,
        observer_role:role,
        department:role,
        location:'Room '+entry.roomNumber,
        category:envIssues.length?'safety':'quality',
        observation:envNotes.length?envNotes.join('; '):'Room '+entry.roomNumber+' ‚Äî all clear',
        severity:envIssues.length>2?'concern':envIssues.length?'info':'info',
        action_needed:false,
        source:'web_app'
      });

      // Resident concern observation
      const res=entry.resident||{};
      if(res.concerns==='yes'||res.discomfort==='yes'){
        const details=[];
        if(res.concerns==='yes'&&res.concernDetails)details.push('Concern: '+res.concernDetails);
        if(res.discomfort==='yes'&&res.discomfortDetails)details.push('Discomfort: '+res.discomfortDetails);
        observations.push({
          timestamp:entry.timestamp,observer_name:entry.rounderName,observer_role:role,department:role,
          location:'Room '+entry.roomNumber,category:'quality',
          observation:details.join('; ')||'Resident concern noted',
          severity:res.discomfort==='yes'?'concern':'info',
          action_needed:true,action_description:details.join('; '),source:'web_app'
        });
      }

      // Staff concern observation
      const stf=entry.staff||{};
      if(stf.concerns==='yes'||stf.engaged==='no'){
        const details=[];
        if(stf.concerns==='yes'&&stf.concernDetails)details.push(stf.concernDetails);
        if(stf.engaged==='no')details.push('Staff not engaged');
        observations.push({
          timestamp:entry.timestamp,observer_name:entry.rounderName,observer_role:role,department:role,
          location:'Room '+entry.roomNumber,category:'people',
          observation:details.join('; ')||'Staff concern noted',
          severity:'concern',action_needed:true,action_description:details.join('; '),source:'web_app'
        });
      }

      // Insert all observations
      const{data:obsData,error:obsErr}=await sb.from('rounding_observations').insert(observations).select('id');
      if(obsErr)console.error('Supabase obs error:',obsErr);

      // Insert action items
      const actionItems=(entry.actions||[]).filter(a=>a.description);
      if(actionItems.length>0&&obsData&&obsData.length>0){
        const aiRows=actionItems.map(a=>({
          title:a.description,
          description:'Room '+entry.roomNumber+': '+a.description,
          category:a.department==='Nursing'?'quality':a.department==='Maintenance/EVS'?'safety':'delivery',
          source_type:'rounding',
          source_id:obsData[0].id,
          assigned_to:a.department||entry.rounderName,
          due_date:new Date(Date.now()+3*86400000).toISOString().split('T')[0],
          status:'open',
          priority:a.priority==='high'?'high':a.priority==='low'?'low':'normal'
        }));
        const{error:aiErr}=await sb.from('action_items').insert(aiRows);
        if(aiErr)console.error('Supabase action_items error:',aiErr);
      }
    }catch(e){console.error('Supabase submit error:',e)}
  }

  // ‚îÄ‚îÄ Fallback: Apps Script (fire-and-forget during transition) ‚îÄ‚îÄ
  if(APPS_SCRIPT_URL){fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)}).catch(()=>{});}
}

  const fileInput=h('input',{type:'file',accept:'.json',className:'hidden'});
  fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;importJSON(f,n=>{if(n>0)showToast('Imported '+n+' rounds');else showToast('Import failed')});e.target.value='';});

  const rs=getRoundingStats(today());
  return h('div',{className:'page'},
    h('div',{className:'card'},
      h('div',{className:'card-hdr'},h('span',{className:'icon'},'üíæ'),'Rounds Data Management'),
      h('div',{style:{fontSize:'14px',marginBottom:'16px'}},'Total rounds in store: ',h('strong',null,String(store.rounds.length)),
        ' | Today: ',h('strong',null,String(rs.dr.length)),
        ' | Unique dates: ',h('strong',null,String(new Set(store.rounds.map(r=>r.roundDate)).size))
      ),
      h('div',{className:'data-actions'},
        h('button',{className:'data-btn',onClick:exportJSON},'Export All Data (JSON)'),
        h('button',{className:'data-btn',onClick:()=>fileInput.click()},'Import Data (JSON)'),
        fileInput
      ),
      h('div',{style:{fontSize:'12px',color:'var(--text-light)',marginTop:'12px'}},'Export your rounds data as JSON to commit to a GitHub repo, or import previous data to restore history.')
    ),
    store.rounds.length?h('div',{className:'card'},
      h('div',{className:'card-hdr'},'Recent Submissions'),
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Date'),h('th',null,'Rounder'),h('th',null,'Room'),h('th',null,'Issues'),h('th',null,'Actions'))),
        h('tbody',null,...store.rounds.slice(-20).reverse().map(r=>{
          const envCount=['roomClean','odorFree','bathroomStocked','tempOk','nameOnDoorCorrect'].filter(f=>r.environment?.[f]==='no').length;
          return h('tr',null,h('td',null,r.roundDate),h('td',null,r.rounderName),h('td',null,'Rm '+r.roomNumber),
            h('td',null,envCount?h('span',{className:'badge b-amber'},envCount+' env'):h('span',{className:'badge b-green'},'Clean')),
            h('td',null,(r.actions||[]).length?h('span',{className:'badge b-blue'},(r.actions||[]).length):h('span',{className:'badge b-gray'},'None')));
        }))
      )
    ):null
  );
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const rs=getRoundingStats(today());
  const roundBadge=rs.missing.length?h('span',{className:'tab-badge'},String(rs.missing.length)):null;

  app.appendChild(h('div',{className:'header'},
    h('div',{className:'hdr-left'},h('h1',null,'MORNING STAR POST ACUTE'),h('div',{className:'sub'},'Daily Management Board ‚Äî '+fmtDate(today()))),
    h('div',{className:'tabs'},
      h('button',{className:'tab'+(currentTab==='board'?' active':''),onClick:()=>{currentTab='board';render()}},'Board'),
      h('button',{className:'tab'+(currentTab==='rounds'?' active':''),onClick:()=>{currentTab='rounds';render()}},'Room Rounds',roundBadge),
      h('button',{className:'tab'+(currentTab==='data'?' active':''),onClick:()=>{currentTab='data';render()}},'Data')
    )
  ));

  if(currentTab==='board')app.appendChild(renderBoard());
  else if(currentTab==='rounds')app.appendChild(renderRoundsForm());
  else if(currentTab==='data')app.appendChild(renderDataTab());

  if(toastMsg)app.appendChild(h('div',{className:'toast'},toastMsg));
}

resetForm();render();loadRounds();
