  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Morning Star Post Acute ‚Äî Daily Management Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{--primary:#1a3c5e;--primary-light:#2980b9;--accent:#e67e22;--success:#27ae60;--danger:#e74c3c;--warn:#f39c12;--bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;--border:#dce1e6;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
/* ‚îÄ‚îÄ HEADER ‚îÄ‚îÄ */
.header{background:linear-gradient(135deg,#0d2137,var(--primary));color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-left h1{font-size:16px;font-weight:800;letter-spacing:.5px}
.hdr-left .sub{font-size:11px;opacity:.7;margin-top:1px}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:8px;padding:3px}
.tab{background:transparent;border:none;color:rgba(255,255,255,.6);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.tab.active{background:#fff;color:var(--primary)}
.tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.12)}
.tab .tab-badge{background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px}
/* ‚îÄ‚îÄ LAYOUT ‚îÄ‚îÄ */
.page{max-width:1200px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border)}
.card-hdr{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-hdr .icon{font-size:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* ‚îÄ‚îÄ KPI STRIP ‚îÄ‚îÄ */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.green::before{background:var(--success)}.kpi.amber::before{background:var(--warn)}.kpi.red::before{background:var(--danger)}.kpi.blue::before{background:var(--primary-light)}
.kpi-val{font-size:28px;font-weight:800;line-height:1}
.kpi.green .kpi-val{color:var(--success)}.kpi.amber .kpi-val{color:var(--warn)}.kpi.red .kpi-val{color:var(--danger)}.kpi.blue .kpi-val{color:var(--primary-light)}
.kpi-label{font-size:10px;color:var(--text-light);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.kpi-sub{font-size:11px;color:var(--text-light);margin-top:2px}
/* ‚îÄ‚îÄ ALERTS ‚îÄ‚îÄ */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.alert-red{background:#fdedec;color:var(--danger);border-left:4px solid var(--danger)}
.alert-amber{background:#fef9e7;color:#856404;border-left:4px solid var(--warn)}
.alert-green{background:#eafaf1;color:var(--success);border-left:4px solid var(--success)}
/* ‚îÄ‚îÄ TABLES ‚îÄ‚îÄ */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{font-weight:700;color:var(--text-light);text-transform:uppercase;font-size:10px;letter-spacing:.5px;background:#fafbfc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.b-green{background:#eafaf1;color:var(--success)}.b-red{background:#fdedec;color:var(--danger)}.b-amber{background:#fef9e7;color:var(--warn)}.b-gray{background:#f0f0f0;color:var(--text-light)}.b-blue{background:#eaf2f8;color:var(--primary-light)}
/* ‚îÄ‚îÄ AGENDA ‚îÄ‚îÄ */
.agenda-item{padding:10px 0;border-bottom:1px solid #eee;display:flex;gap:10px;align-items:flex-start}
.agenda-item:last-child{border-bottom:none}
.agenda-num{background:var(--primary);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.agenda-title{font-weight:700;font-size:13px}
.agenda-time{font-size:11px;color:var(--text-light);background:#f0f2f5;padding:1px 6px;border-radius:4px;margin-left:6px}
.agenda-data{font-size:12px;color:var(--text);margin-top:3px;line-height:1.5}
/* ‚îÄ‚îÄ SURVEY TAGS ‚îÄ‚îÄ */
.tag-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #eee;font-size:13px}
.tag-row:last-child{border-bottom:none}
.tag-code{font-weight:700;min-width:70px}
.tag-bar{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.tag-fill{height:100%;border-radius:4px}
/* ‚îÄ‚îÄ FILTER TABS ‚îÄ‚îÄ */
.filter-tabs{display:flex;gap:4px;margin-bottom:12px}
.ftab{padding:6px 12px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:12px;font-weight:600;cursor:pointer}
.ftab.active{border-color:var(--primary);background:#eaf2f8;color:var(--primary)}
/* ‚îÄ‚îÄ ROOM ROUNDS FORM ‚îÄ‚îÄ */
.form-wrap{max-width:600px;margin:0 auto}
.section-header{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:4px}
.section-desc{font-size:13px;color:var(--text-light);margin-bottom:16px}
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.3s}
.dot.active{background:var(--primary);transform:scale(1.2)}.dot.done{background:var(--success)}
.field{margin-bottom:14px}
.field>label{font-size:14px;font-weight:600;margin-bottom:6px;display:block}
.req{color:var(--danger)}
select,input[type=text],input[type=date],textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;background:#fff;color:var(--text)}
input[type=text],input[type=date],textarea{-webkit-appearance:none}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(41,128,185,.1)}
textarea{resize:vertical;min-height:70px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.toggle-row:last-child{border-bottom:none}
.mini-toggle{display:flex;gap:5px}
.mbtn{padding:7px 13px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.mbtn:active{transform:scale(.95)}
.mbtn.sy{border-color:var(--success);background:#eafaf1;color:var(--success)}
.mbtn.sn{border-color:var(--danger);background:#fdedec;color:var(--danger)}
.mbtn.sna{border-color:var(--text-light);background:#f0f0f0;color:var(--text-light)}
.big-toggle{display:flex;gap:8px}
.big-btn{flex:1;padding:12px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.big-btn:active{transform:scale(.97)}
.big-btn.by{border-color:var(--success);background:#eafaf1;color:var(--success)}
.big-btn.bn{border-color:var(--danger);background:#fdedec;color:var(--danger)}
.sat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sat-btn{padding:12px 8px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.sat-btn.sel{border-color:var(--primary);background:#eaf2f8;color:var(--primary)}
.pri-row{display:flex;gap:8px}
.pri-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.pri-btn.pl{border-color:var(--success);background:#eafaf1;color:var(--success)}
.pri-btn.pm{border-color:var(--warn);background:#fef9e7;color:var(--warn)}
.pri-btn.ph{border-color:var(--danger);background:#fdedec;color:var(--danger)}
.bed-card{background:#f8f9fa;border-radius:8px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.bed-label{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px}
.action-card{background:#f8f9fa;border-radius:8px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
/* ‚îÄ‚îÄ CHECKLIST ITEMS ‚îÄ‚îÄ */
.checklist-item{display:flex;align-items:center;padding:12px;border:2px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.2s;background:#fff}
.checklist-item:hover{border-color:var(--primary-light)}
.checklist-item.checked{border-color:var(--success);background:#f0faf5}
.check-icon{width:24px;height:24px;border-radius:50%;border:2px solid #bdc3c7;margin-right:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-size:12px;color:transparent}
.checklist-item.checked .check-icon{background:var(--success);border-color:var(--success);color:#fff}
.checklist-item .item-text{font-size:14px;font-weight:500}
/* ‚îÄ‚îÄ BED TABS (environment + resident) ‚îÄ‚îÄ */
.bed-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border)}
.bed-tab{padding:8px 14px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;position:relative}
.bed-tab:hover{border-color:var(--primary-light)}
.bed-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
.bed-tab.done::after{content:"\2713";position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--success);color:#fff;border-radius:50%;font-size:11px;line-height:18px;text-align:center}
.bed-tab-gold.active{border-color:var(--accent);background:var(--accent);color:#fff}
/* ‚îÄ‚îÄ RESIDENT CARD ‚îÄ‚îÄ */
.resident-card{display:none;animation:fadeUp .3s}
.resident-card.active-card{display:block}
.resident-card-header{background:linear-gradient(135deg,#f0f7fc,#e8f0fe);padding:10px 14px;border-radius:8px;margin-bottom:14px;font-weight:700;color:var(--primary);font-size:15px}
/* ‚îÄ‚îÄ CONCERN CHECKLIST ‚îÄ‚îÄ */
.concern-item{display:flex;align-items:center;padding:10px 12px;border:2px solid #f8d7da;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.2s;background:#fff}
.concern-item:hover{border-color:var(--danger)}
.concern-item.checked{border-color:var(--danger);background:#fdedec}
.concern-item .check-icon{border-color:#e0b4b4}
.concern-item.checked .check-icon{background:var(--danger);border-color:var(--danger);color:#fff}
/* ‚îÄ‚îÄ HEART BADGE ‚îÄ‚îÄ */
.heart-badge{display:inline-block;background:rgba(230,126,34,.12);color:var(--accent);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-top:8px;letter-spacing:.5px}
/* ‚îÄ‚îÄ PRIORITY URGENT ‚îÄ‚îÄ */
.pri-btn.pu{border-color:#8e44ad;background:#f4ecf7;color:#8e44ad}
/* ‚îÄ‚îÄ ROOM FEEL RATING ‚îÄ‚îÄ */
.feel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.feel-btn{padding:12px 8px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.feel-btn.sel{border-color:var(--success);background:#eafaf1;color:var(--success)}
/* ‚îÄ‚îÄ ENV SECTION BLOCKS ‚îÄ‚îÄ */
.env-block{border-radius:8px;padding:14px;margin-bottom:14px}
.env-block-room{background:#f8fbfe;border-left:3px solid var(--primary-light)}
.env-block-bed{background:#fdf8f0;border-left:3px solid var(--accent)}
.env-block-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.env-block-room .env-block-label{color:var(--primary-light)}
.env-block-bed .env-block-label{color:var(--accent)}
.all-good-btn{background:#f0faf5;border-color:#b8e6cc;margin-bottom:12px}
.all-good-btn .item-text{color:var(--success);font-weight:700}
.btn{padding:14px 24px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;width:100%}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-light)}
.btn-s{background:var(--success);color:#fff}
.btn-o{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-row{display:flex;gap:10px;margin-top:10px}
.btn-row .btn{flex:1}
.success-screen{text-align:center;padding:50px 20px}
.success-icon{font-size:56px;margin-bottom:12px;color:var(--success)}
.success-title{font-size:22px;font-weight:700;color:var(--success);margin-bottom:6px}
.success-sub{font-size:14px;color:var(--text-light);margin-bottom:28px}
/* Issue list */
.issue-list{list-style:none}
.issue-item{padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;font-size:13px}
.issue-item:last-child{border-bottom:none}
.issue-room{background:var(--primary);color:#fff;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap}
.issue-text{flex:1}
.ip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.ip-high{background:#fdedec;color:var(--danger)}.ip-med{background:#fef9e7;color:var(--warn)}.ip-low{background:#eafaf1;color:var(--success)}
.data-actions{display:flex;gap:6px;flex-wrap:wrap}
.data-btn{padding:6px 12px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--text);transition:.2s}
.data-btn:hover{border-color:var(--primary);color:var(--primary)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:200;animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty-state{text-align:center;padding:30px;color:var(--text-light)}
.hidden{display:none}
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text-light)}
/* Chart container */
.chart-wrap{position:relative;height:180px;margin-top:8px}
@media(max-width:768px){
  .two-col,.three-col{grid-template-columns:1fr}
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
  .kpi-strip .kpi:last-child{grid-column:span 2}
  .header{flex-direction:column;gap:8px;align-items:stretch;padding:10px 14px}
  .tabs{justify-content:center;flex-wrap:wrap}
  .tab{padding:6px 10px;font-size:11px}
}
</style>
</head>

// ‚îÄ‚îÄ LOAD ROUNDS FROM SUPABASE ‚îÄ‚îÄ
async function loadRounds(){
  if(!sb)return;
  try{
    // Get Monday of current week
    const wd=getWeekDates();
    const weekStart=wd[0]+'T00:00:00';
    const weekEnd=wd[4]+'T23:59:59';
    const{data,error}=await sb.from('rounding_observations')
      .select('id,timestamp,observer_name,observer_role,location,category,observation,severity,action_needed,action_description,source')
      .gte('timestamp',weekStart)
      .lte('timestamp',weekEnd)
      .order('timestamp',{ascending:true});
    if(error){console.error('Supabase load error:',error);return}
    if(!data||!data.length)return;
    // Group by observer+date+room to reconstruct round entries
    const roundMap={};
    data.forEach(obs=>{
      const date=obs.timestamp.split('T')[0];
      const room=(obs.location||'').replace('Room ','');
      const key=obs.observer_name+'|'+date+'|'+room;
      if(!roundMap[key]){
        roundMap[key]={
          id:'sb-'+obs.id,
          timestamp:obs.timestamp,
          rounderName:obs.observer_name,
          roomNumber:room,
          roundDate:date,
          environment:{},
          beds:[],
          resident:{},
          staff:{},
          actions:[],
          _observations:[obs]
        };
      }else{
        roundMap[key]._observations.push(obs);
      }
      // If observation has action items, add them
      if(obs.action_needed&&obs.action_description){
        roundMap[key].actions.push({description:obs.action_description,priority:obs.severity==='urgent'?'high':'medium',department:obs.observer_role||''});
      }
    });
    // Merge Supabase rounds into store without duplicating
    const existingKeys=new Set(store.rounds.map(r=>r.rounderName+'|'+r.roundDate+'|'+r.roomNumber));
    Object.values(roundMap).forEach(r=>{
      const key=r.rounderName+'|'+r.roundDate+'|'+r.roomNumber;
      if(!existingKeys.has(key)){
        store.rounds.push(r);
        existingKeys.add(key);
      }
    });
    supabaseLoaded=true;
    render();
  }catch(e){console.error('loadRounds error:',e)}
}

// ‚îÄ‚îÄ DOM HELPER ‚îÄ‚îÄ
function h(tag,a,...ch){
  const el=document.createElement(tag);
  let deferValue;
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='className')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k==='value'){deferValue=v}
    else if(k==='checked'){el.checked=v}
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c!=null&&c!==false)el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});
  if(deferValue!==undefined)el.value=deferValue;
  return el;
}
// ‚îÄ‚îÄ ROUNDING ANALYTICS (computed from store) ‚îÄ‚îÄ
function getRoundingStats(date){
  const dr=store.rounds.filter(r=>r.roundDate===date);
  const names=new Set(dr.map(r=>r.rounderName));
  const assigned=ROSTER.filter(r=>r.assigned);
  const missing=assigned.filter(r=>!names.has(r.name));
  const comp=assigned.length?Math.round(((assigned.length-missing.length)/assigned.length)*100):0;
  let envIssues=[],resConcerns=[],staffConcerns=[],actions=[];
  dr.forEach(r=>{
    // Support both old format (env keys like roomClean) and new format (environment_compat or environment.roomChecks)
    const e=r.environment_compat||r.environment||{};
    // Old-style keys
    const lbls={roomClean:'Not clean',odorFree:'Odor present',bathroomStocked:'Bathroom not stocked',tempOk:'Temp issue',nameOnDoorCorrect:'Name on door incorrect'};
    Object.keys(lbls).forEach(f=>{if(e[f]==='no')envIssues.push({room:r.roomNumber,issue:lbls[f],notes:e.notes})});
    // New-style roomChecks (from new form)
    if(e.roomChecks){
      Object.entries(e.roomChecks).forEach(([item,ok])=>{if(!ok)envIssues.push({room:r.roomNumber,issue:item})});
    }
    // Old-style beds array
    (r.beds||[]).forEach((b,i)=>{
      const bl={callLight:'Call light',personalItems:'Personal items',nameOnDoor:'Name on door',o2Tubing:'O2 tubing'};
      Object.keys(bl).forEach(f=>{if(b[f]==='no')envIssues.push({room:r.roomNumber,issue:'Bed '+(i?'B':'A')+': '+bl[f]})});
    });
    // New-style perBed env data
    if(e.perBed){
      Object.entries(e.perBed).forEach(([bed,checks])=>{
        Object.entries(checks).forEach(([item,ok])=>{if(!ok)envIssues.push({room:r.roomNumber,issue:(bed!=='Private'?'Bed '+bed+': ':'')+item})});
      });
    }
    // Resident concerns (both old and new)
    if(r.resident?.concerns==='yes')resConcerns.push({room:r.roomNumber,detail:r.resident.concernDetails});
    if(r.resident?.discomfort==='yes')resConcerns.push({room:r.roomNumber,detail:'Discomfort: '+(r.resident.discomfortDetails||'observed')});
    // New-style per-bed residents
    if(r.residents){
      Object.entries(r.residents).forEach(([bed,rd])=>{
        if(rd.spoke==='yes'){
          const cc=(rd.concerns||[]);
          const ccNames=typeof cc[0]==='string'?cc:[];
          if(ccNames.length)resConcerns.push({room:r.roomNumber,detail:(bed!=='Private'?'Bed '+bed+': ':'')+ccNames.join(', ')});
          if(rd.mood==='Poor')resConcerns.push({room:r.roomNumber,detail:(bed!=='Private'?'Bed '+bed+': ':'')+'Mood: Poor'});
        }
      });
    }
    // Staff concerns (both old and new)
    if(r.staff?.concerns==='yes')staffConcerns.push({room:r.roomNumber,detail:r.staff.concernDetails});
    if(r.staff?.engaged==='no')staffConcerns.push({room:r.roomNumber,detail:'Staff not engaged'});
    if(r.staff?.haveNeeds==='no')staffConcerns.push({room:r.roomNumber,detail:'Staff needs not met'+(r.staff.barriers?' ‚Äî '+r.staff.barriers:'')});
    if(r.staff?.barriers&&r.staff.haveNeeds!=='no')staffConcerns.push({room:r.roomNumber,detail:'Barriers: '+r.staff.barriers});
    // Actions
    (r.actions||[]).forEach(a=>{if(a.description)actions.push({room:r.roomNumber,...a})});
  });
  return{dr,names,assigned,missing,comp,envIssues,resConcerns,staffConcerns,actions,rounded:assigned.length-missing.length};
}
// Week dates helper
function getWeekDates(refDate){
  const d=new Date((refDate||today())+'T12:00:00');const day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  const dates=[];for(let i=0;i<5;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);dates.push(dd.toISOString().split('T')[0])}
  return dates;
}

// Room bed configuration
const ROOM_BEDS={
  '1':['Private'],'2':['Private'],'3':['Private'],'4':['Private'],
  '5':['A','B','C','D'],'6':['A','B','C'],'7':['A','B','C'],
  '8':['A','B','C'],'9':['A','B','C'],'10':['A','B','C'],'18':['A','B'],

const ROOM_GROUPS=[
  {label:'East Wing (Private)',rooms:['1','2','3','4']},
  {label:'East Wing (Semi-Private)',rooms:['5','6','7']},
  {label:'North Wing',rooms:['8','9','10','18']},
  {label:'West Wing',rooms:['11','12','14','15','16']}

const ROOM_ENV_ITEMS=['Room clean and free of odor','Bathroom clean and stocked','No safety hazards','Temperature comfortable','Name on door correct'];
const BED_ENV_ITEMS=['Call light within reach','Personal items accessible','Bed in lowest position, brakes locked','O2 tubing dated within 7 days'];
const CONCERN_ITEMS=['Meals / food quality','Pain management','Call light response time','Noise / sleep disruption','Feeling lonely or bored','Staff attitude or communication','Cleanliness / laundry'];
function resetForm(keepName){
  formState={step:0,submitted:false,name:keepName||'',room:'',date:today(),
    selectedBeds:[],
    // Room-level environment checklist (array of booleans matching ROOM_ENV_ITEMS)
    envRoom:ROOM_ENV_ITEMS.map(()=>false),
    // Per-bed environment: keyed by bed label, each is array of booleans matching BED_ENV_ITEMS + allOk flag
    envBeds:{},
    envNotes:'',
    envActiveBedTab:0,
    // Per-bed resident data keyed by bed label
    residents:{},
    resActiveBedTab:0,
    // Staff check-in
    staff:{spoke:'',name:'',haveNeeds:'',barriers:'',recognition:''},
    // Follow-up
    needsAction:'',actions:[{description:'',priority:'',department:''}],
    showSecondAction:false,
    overallFeel:'',
    notes:''
  };
}
// Get selected beds, with fallback
function getSelectedBeds(f){
  if(f.selectedBeds.length>0)return f.selectedBeds;
  if(f.room&&ROOM_BEDS[f.room]){
    const beds=ROOM_BEDS[f.room];
    return beds[0]==='Private'?['Private']:beds;
  }
  return[];
}
// Initialize per-bed data structures when beds change
function initBedData(f){
  const beds=getSelectedBeds(f);
  beds.forEach(b=>{
    if(!f.envBeds[b])f.envBeds[b]={items:BED_ENV_ITEMS.map(()=>false),allOk:false};
    if(!f.residents[b])f.residents[b]={spoke:'',mood:'',concerns:CONCERN_ITEMS.map(()=>false),quote:'',asked:'',done:false};
  });
}
// Mini toggle helper
function mt(val,setter,opts){

  return h('div',{className:'mini-toggle'},...opts.map(o=>h('button',{className:'mbtn'+(val===o.v?' '+o.c:''),onClick:()=>{setter(o.v);render()}},o.l)));

// Big toggle helper
function bt(val,setter,opts){
  opts=opts||[{l:'Yes',v:'yes',c:'by'},{l:'No',v:'no',c:'bn'}];
  return h('div',{className:'big-toggle'},...opts.map(o=>h('button',{className:'big-btn'+(val===o.v?' '+o.c:''),onClick:()=>{setter(o.v);render()}},o.l)));

// Checklist item helper
function chk(checked,label,onClick,extraClass){
  return h('div',{className:'checklist-item'+(extraClass?' '+extraClass:'')+(checked?' checked':''),onClick:()=>{onClick();render()}},
    h('div',{className:'check-icon'},'\u2713'),

  );
}

}
async function submitRound(){

        return[b,BED_ENV_ITEMS.reduce((o,item,i)=>{o[item]=bd.items[i];return o},{})];

    residents:Object.fromEntries(beds.map(b=>{
      const rd=f.residents[b]||{};
      return[b,{spoke:rd.spoke||'',mood:rd.mood||'',concerns:CONCERN_ITEMS.filter((_,i)=>(rd.concerns||[])[i]),quote:rd.quote||'',asked:rd.asked||''}];
    })),
    staff:{spoke:f.staff.spoke,name:f.staff.name||'',haveNeeds:f.staff.haveNeeds||'',barriers:f.staff.barriers||'',recognition:f.staff.recognition||''},
    actions:f.needsAction==='yes'?f.actions.filter(a=>a.description):[],
    overallFeel:f.overallFeel||'',
    additionalNotes:f.notes
  };
  // Backwards-compatible fields for getRoundingStats
  const envCompat={};
  if(!f.envRoom[0])envCompat.roomClean='no';
  if(!f.envRoom[1])envCompat.bathroomStocked='no';
  if(!f.envRoom[3])envCompat.tempOk='no';
  if(!f.envRoom[4])envCompat.nameOnDoorCorrect='no';
  envCompat.notes=f.envNotes;
  entry.environment_compat=envCompat;
  // Check if any resident had concerns
  const anyConcerns=beds.some(b=>{
    const rd=f.residents[b]||{};
    return rd.spoke==='yes'&&(rd.concerns||[]).some(x=>x);
  });
  const anyQuotes=beds.map(b=>(f.residents[b]||{}).quote).filter(q=>q).join('; ');
  entry.resident={
    ableToCheckIn:beds.some(b=>(f.residents[b]||{}).spoke==='yes')?'yes':'no',
    concerns:anyConcerns?'yes':'no',
    concernDetails:beds.map(b=>{
      const rd=f.residents[b]||{};
      if(rd.spoke!=='yes')return null;
      const cc=CONCERN_ITEMS.filter((_,i)=>(rd.concerns||[])[i]);
      return cc.length?(b!=='Private'?'Bed '+b+': ':'')+cc.join(', '):null;
    }).filter(Boolean).join('; '),
    discomfort:beds.some(b=>(f.residents[b]||{}).mood==='Poor')?'yes':'no',
    discomfortDetails:anyQuotes,
    satisfaction:f.overallFeel||''
  };
  store.rounds.push(entry);f.submitted=true;
  showToast('Room '+f.room+' logged!');
  render();
  // ‚îÄ‚îÄ Write to Supabase ‚îÄ‚îÄ
  if(sb){
    try{
      const rosterEntry=ROSTER.find(r=>r.name===entry.rounderName);
      const role=rosterEntry?rosterEntry.dept:'';
      const observations=[];
      // === Environment observation ===
      const envIssues=[];
      ROOM_ENV_ITEMS.forEach((item,i)=>{if(!f.envRoom[i])envIssues.push(item+' ‚Äî NO')});
      beds.forEach(b=>{
        const bd=f.envBeds[b]||{items:[]};
        BED_ENV_ITEMS.forEach((item,i)=>{if(!bd.items[i])envIssues.push((b!=='Private'?'Bed '+b+': ':'')+item+' ‚Äî NO')});
      });
      const envNotesParts=[...envIssues];
      if(f.envNotes)envNotesParts.push(f.envNotes);
      observations.push({
        timestamp:entry.timestamp,
        observer_name:entry.rounderName,
        observer_role:role,
        department:role,
        location:'Room '+entry.roomNumber,
        category:envIssues.length?'safety':'quality',
        observation:envNotesParts.length?envNotesParts.join('; '):'Room '+entry.roomNumber+' \u2014 environment all clear',
        severity:envIssues.length>2?'concern':envIssues.length?'info':'info',
        action_needed:false,
        source:'web_app'
      });
      // === Per-bed resident observations ===
      beds.forEach(b=>{
        const rd=f.residents[b]||{};
        if(rd.spoke==='yes'){
          const bedLabel=b!=='Private'?'Bed '+b+': ':'';
          const parts=[];
          if(rd.mood)parts.push('Mood: '+rd.mood);
          const cc=CONCERN_ITEMS.filter((_,i)=>(rd.concerns||[])[i]);
          if(cc.length)parts.push('Concerns: '+cc.join(', '));
          if(rd.quote)parts.push('Quote: "'+rd.quote+'"');
          if(rd.asked)parts.push('Asked if anything needed: '+rd.asked);
          const hasConcerns=cc.length>0||rd.mood==='Poor';
          observations.push({
            timestamp:entry.timestamp,observer_name:entry.rounderName,observer_role:role,department:role,
            location:'Room '+entry.roomNumber,category:'quality',
            observation:bedLabel+(parts.length?parts.join('; '):'Resident check-in OK'),
            severity:rd.mood==='Poor'?'concern':cc.length?'info':'info',
            action_needed:hasConcerns,
            action_description:hasConcerns?(bedLabel+cc.join(', ')+(rd.mood==='Poor'?' (mood: Poor)':'')):null,
            source:'web_app'
          });
        }else if(rd.spoke){
          observations.push({
            timestamp:entry.timestamp,observer_name:entry.rounderName,observer_role:role,department:role,
            location:'Room '+entry.roomNumber,category:'quality',
            observation:(b!=='Private'?'Bed '+b+': ':'')+'Not able to speak \u2014 '+rd.spoke,
            severity:'info',action_needed:false,source:'web_app'
          });
        }
      });
      // === Staff observation ===
      if(f.staff.spoke==='yes'){
        const sParts=[];
        if(f.staff.name)sParts.push('Staff: '+f.staff.name);
        if(f.staff.haveNeeds)sParts.push('Have what they need: '+f.staff.haveNeeds);
        if(f.staff.barriers)sParts.push('Barriers: '+f.staff.barriers);
        if(f.staff.recognition)sParts.push('Recognition: '+f.staff.recognition);
        const staffHasIssues=f.staff.haveNeeds==='no'||f.staff.barriers;
        observations.push({
          timestamp:entry.timestamp,observer_name:entry.rounderName,observer_role:role,department:role,
          location:'Room '+entry.roomNumber,category:'people',
          observation:sParts.join('; '),
          severity:staffHasIssues?'concern':'info',
          action_needed:!!staffHasIssues,
          action_description:staffHasIssues?('Staff needs: '+(f.staff.barriers||'needs not met')):null,
          source:'web_app'
        });
      }
      // === Overall feel observation ===
      if(entry.overallFeel){
        observations.push({
          timestamp:entry.timestamp,observer_name:entry.rounderName,observer_role:role,department:role,
          location:'Room '+entry.roomNumber,category:'quality',
          observation:'Overall room feel: '+entry.overallFeel+(entry.additionalNotes?' \u2014 '+entry.additionalNotes:''),
          severity:entry.overallFeel==='Concern'?'concern':entry.overallFeel==='Needs Work'?'info':'info',
          action_needed:entry.overallFeel==='Concern'||entry.overallFeel==='Needs Work',
          source:'web_app'
        });
      }
      // Insert all observations
      const{data:obsData,error:obsErr}=await sb.from('rounding_observations').insert(observations).select('id');
      if(obsErr)console.error('Supabase obs error:',obsErr);
      // Insert action items
      const actionItems=(entry.actions||[]).filter(a=>a.description);
      if(actionItems.length>0&&obsData&&obsData.length>0){
        const aiRows=actionItems.map(a=>({
          title:a.description,
          description:'Room '+entry.roomNumber+': '+a.description,
          category:a.department==='Nursing'?'quality':a.department==='Maintenance/EVS'?'safety':'delivery',
          source_type:'rounding',
          source_id:obsData[0].id,
          assigned_to:a.department||entry.rounderName,
          due_date:new Date(Date.now()+3*86400000).toISOString().split('T')[0],
          status:'open',
          priority:a.priority==='urgent'?'high':a.priority==='high'?'high':a.priority==='low'?'low':'normal'
        }));
        const{error:aiErr}=await sb.from('action_items').insert(aiRows);
        if(aiErr)console.error('Supabase action_items error:',aiErr);
      }
    }catch(e){console.error('Supabase submit error:',e)}
  }
  // ‚îÄ‚îÄ Fallback: Apps Script (fire-and-forget during transition) ‚îÄ‚îÄ
  if(APPS_SCRIPT_URL){fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)}).catch(()=>{});}
}
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// TAB 3: DATA MANAGEMENT
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function renderDataTab(){
  const fileInput=h('input',{type:'file',accept:'.json',className:'hidden'});
  fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;importJSON(f,n=>{if(n>0)showToast('Imported '+n+' rounds');else showToast('Import failed')});e.target.value='';});
  const rs=getRoundingStats(today());
  return h('div',{className:'page'},
    h('div',{className:'card'},
      h('div',{className:'card-hdr'},h('span',{className:'icon'},'üíæ'),'Rounds Data Management'),
      h('div',{style:{fontSize:'14px',marginBottom:'16px'}},'Total rounds in store: ',h('strong',null,String(store.rounds.length)),
        ' | Today: ',h('strong',null,String(rs.dr.length)),
        ' | Unique dates: ',h('strong',null,String(new Set(store.rounds.map(r=>r.roundDate)).size))
      ),
      h('div',{className:'data-actions'},
        h('button',{className:'data-btn',onClick:exportJSON},'Export All Data (JSON)'),
        h('button',{className:'data-btn',onClick:()=>fileInput.click()},'Import Data (JSON)'),
        fileInput
      ),
      h('div',{style:{fontSize:'12px',color:'var(--text-light)',marginTop:'12px'}},'Export your rounds data as JSON to commit to a GitHub repo, or import previous data to restore history.')
    ),
    store.rounds.length?h('div',{className:'card'},
      h('div',{className:'card-hdr'},'Recent Submissions'),
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Date'),h('th',null,'Rounder'),h('th',null,'Room'),h('th',null,'Issues'),h('th',null,'Actions'))),
        h('tbody',null,...store.rounds.slice(-20).reverse().map(r=>{
          const envCount=['roomClean','odorFree','bathroomStocked','tempOk','nameOnDoorCorrect'].filter(f=>r.environment?.[f]==='no').length;
          return h('tr',null,h('td',null,r.roundDate),h('td',null,r.rounderName),h('td',null,'Rm '+r.roomNumber),
            h('td',null,envCount?h('span',{className:'badge b-amber'},envCount+' env'):h('span',{className:'badge b-green'},'Clean')),
            h('td',null,(r.actions||[]).length?h('span',{className:'badge b-blue'},(r.actions||[]).length):h('span',{className:'badge b-gray'},'None')));
        }))
      )
    ):null
  );
}
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// MAIN RENDER
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const rs=getRoundingStats(today());
  const roundBadge=rs.missing.length?h('span',{className:'tab-badge'},String(rs.missing.length)):null;
  app.appendChild(h('div',{className:'header'},
    h('div',{className:'hdr-left'},h('h1',null,'MORNING STAR POST ACUTE'),h('div',{className:'sub'},'Daily Management Board ‚Äî '+fmtDate(today()))),
    h('div',{className:'tabs'},
      h('button',{className:'tab'+(currentTab==='board'?' active':''),onClick:()=>{currentTab='board';render()}},'Board'),
      h('button',{className:'tab'+(currentTab==='rounds'?' active':''),onClick:()=>{currentTab='rounds';render()}},'Room Rounds',roundBadge),
      h('button',{className:'tab'+(currentTab==='data'?' active':''),onClick:()=>{currentTab='data';render()}},'Data')
    )
  ));
  if(currentTab==='board')app.appendChild(renderBoard());
  else if(currentTab==='rounds')app.appendChild(renderRoundsForm());
  else if(currentTab==='data')app.appendChild(renderDataTab());
  if(toastMsg)app.appendChild(h('div',{className:'toast'},toastMsg));
}
resetForm();render();loadRounds();
</script>
